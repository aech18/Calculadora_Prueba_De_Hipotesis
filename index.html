<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Hipótesis 8 Pasos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script>
</head>
<body class="bg-slate-100 text-slate-800 p-4 font-sans pb-20">
    <div class="max-w-lg mx-auto bg-white rounded-xl shadow-lg overflow-hidden p-6 border-t-4 border-blue-600">
        <h1 class="text-2xl font-black text-center text-blue-700 mb-1">Calculadora 8 Pasos</h1>
        <p class="text-xs text-center text-gray-500 mb-6 font-bold uppercase tracking-wider">Ingeniería de Computación - Estadística</p>

        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-sm font-bold text-gray-700">Tipo de Prueba</label>
                    <select id="testType" onchange="actualizarUI()" class="w-full mt-1 border-2 border-gray-300 rounded-lg p-2 bg-gray-50">
                        <option value="z">Prueba Z (Diferencia Medias, σ conocida)</option>
                        <option value="t">Prueba t (Diferencia Medias, Var. desconocida)</option>
                        <option value="chi">Prueba Chi-Cuadrado (Una Varianza)</option>
                        <option value="f">Prueba F de Fisher (Dos Varianzas)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Hipótesis (H1)</label>
                    <select id="tails" class="w-full mt-1 border-2 border-gray-300 rounded-lg p-2 bg-gray-50">
                        <option value="right">Mayor que (Cola Derecha >)</option>
                        <option value="left">Menor que (Cola Izquierda <)</option>
                        <option value="two">Diferente (Dos Colas ≠)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700">Alpha (α)</label>
                    <input type="number" id="alpha" value="0.05" step="0.01" class="w-full mt-1 border-2 rounded-lg p-2 text-center">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-bold text-gray-700">Valor de H0 (Diferencia, Límite o Constante 'c')</label>
                    <input type="number" id="mu0" value="1.2" step="0.001" class="w-full mt-1 border-2 border-blue-200 rounded-lg p-2 text-center text-blue-900 font-bold bg-blue-50">
                </div>
            </div>

            <div id="panelM1" class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                <h3 class="font-bold text-slate-800 text-sm mb-2" id="labelM1">Muestra 1 (Numerador)</h3>
                
                <div class="mb-3 bg-white p-2 rounded border border-slate-200">
                    <label class="text-xs text-gray-600 font-semibold">Pegar datos brutos (separados por coma o espacio):</label>
                    <textarea id="raw1" rows="2" class="w-full border rounded p-1 text-sm mt-1" placeholder="Ej: 3.30, 3.42, 3.36..."></textarea>
                    <button onclick="procesarDatos(1)" class="w-full mt-1 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold py-1.5 rounded transition-colors">
                        Autocalcular n, Media y Varianza ↓
                    </button>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div><label class="text-xs text-gray-500 font-bold">n1</label><input type="number" id="n1" value="15" class="w-full border-2 rounded p-1 text-center bg-white"></div>
                    <div id="divX1"><label class="text-xs text-gray-500 font-bold">Media (x̄1)</label><input type="number" id="x1" value="3.3433" step="0.0001" class="w-full border-2 rounded p-1 text-center bg-white"></div>
                    <div><label class="text-xs text-gray-500 font-bold">Varianza (S²)</label><input type="number" id="v1" value="0.003467" step="0.000001" class="w-full border-2 rounded p-1 text-center bg-white"></div>
                </div>
            </div>

            <div id="panelM2" class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                <h3 class="font-bold text-slate-800 text-sm mb-2" id="labelM2">Muestra 2 (Denominador)</h3>
                
                <div class="mb-3 bg-white p-2 rounded border border-slate-200">
                    <label class="text-xs text-gray-600 font-semibold">Pegar datos brutos (separados por coma o espacio):</label>
                    <textarea id="raw2" rows="2" class="w-full border rounded p-1 text-sm mt-1" placeholder="Ej: 2.05, 2.14, 2.02..."></textarea>
                    <button onclick="procesarDatos(2)" class="w-full mt-1 bg-slate-800 hover:bg-slate-700 text-white text-xs font-bold py-1.5 rounded transition-colors">
                        Autocalcular n, Media y Varianza ↓
                    </button>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <div><label class="text-xs text-gray-500 font-bold">n2</label><input type="number" id="n2" value="18" class="w-full border-2 rounded p-1 text-center bg-white"></div>
                    <div id="divX2"><label class="text-xs text-gray-500 font-bold">Media (x̄2)</label><input type="number" id="x2" value="2.0950" step="0.0001" class="w-full border-2 rounded p-1 text-center bg-white"></div>
                    <div><label class="text-xs text-gray-500 font-bold">Varianza (S²)</label><input type="number" id="v2" value="0.006215" step="0.000001" class="w-full border-2 rounded p-1 text-center bg-white"></div>
                </div>
            </div>

            <button onclick="calcular()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl mt-4 shadow-lg transition-colors">
                EJECUTAR LOS 8 PASOS
            </button>
        </div>

        <div id="resultados" class="mt-8 hidden">
            <h2 class="text-xl font-bold mb-4 border-b-2 border-blue-200 pb-2 text-blue-800">Resolución Paso a Paso:</h2>
            <ul class="space-y-3 text-sm text-gray-700" id="pasosList"></ul>
            
            <div class="mt-8">
                <canvas id="miGrafica" width="400" height="250"></canvas>
            </div>
        </div>
    </div>

    <script>
        let myChart = null;
        Chart.register(window['chartjs-plugin-annotation']);

        // Función para calcular n, media y varianza desde la caja de texto
        function procesarDatos(numMuestra) {
            let texto = document.getElementById('raw' + numMuestra).value;
            // Reemplaza comas por espacios para limpiar, excepto si están pegadas a números
            texto = texto.replace(/,/g, ' '); 
            
            // Extraer todos los números
            let partes = texto.split(/\s+/);
            let datos = [];
            
            for(let i=0; i<partes.length; i++) {
                let numero = parseFloat(partes[i]);
                if(!isNaN(numero)) {
                    datos.push(numero);
                }
            }

            if(datos.length === 0) {
                alert("No se detectaron números válidos. Asegúrate de separar los números por espacios o comas.");
                return;
            }

            let n = datos.length;
            let suma = datos.reduce((a, b) => a + b, 0);
            let media = suma / n;
            
            // Varianza Muestral (n-1)
            let sumaCuadrados = datos.reduce((a, b) => a + Math.pow(b - media, 2), 0);
            let varianza = n > 1 ? sumaCuadrados / (n - 1) : 0;

            // Llenar los campos visualmente
            document.getElementById('n' + numMuestra).value = n;
            document.getElementById('x' + numMuestra).value = media.toFixed(4);
            document.getElementById('v' + numMuestra).value = varianza.toFixed(6);

            // Pequeña animación visual para indicar que se calcularon
            let divPanel = document.getElementById('panelM' + numMuestra);
            divPanel.classList.add('bg-green-50', 'border-green-300');
            setTimeout(() => {
                divPanel.classList.remove('bg-green-50', 'border-green-300');
            }, 500);
        }

        function actualizarUI() {
            let type = document.getElementById('testType').value;
            let m2 = document.getElementById('panelM2');
            let dx1 = document.getElementById('divX1');
            
            if(type === 'chi') {
                m2.style.display = 'none';
                dx1.style.display = 'none';
                document.getElementById('labelM1').innerText = "Datos de la Muestra";
            } else if (type === 'f') {
                m2.style.display = 'block';
                dx1.style.display = 'none';
                document.getElementById('divX2').style.display = 'none';
                document.getElementById('labelM1').innerText = "Muestra 1 (Numerador F)";
                document.getElementById('labelM2').innerText = "Muestra 2 (Denominador F)";
            } else {
                m2.style.display = 'block';
                dx1.style.display = 'block';
                document.getElementById('divX2').style.display = 'block';
                document.getElementById('labelM1').innerText = "Muestra 1";
                document.getElementById('labelM2').innerText = "Muestra 2";
            }
        }

        function calcular() {
            let type = document.getElementById('testType').value;
            let tail = document.getElementById('tails').value;
            let alpha = parseFloat(document.getElementById('alpha').value);
            let valH0 = parseFloat(document.getElementById('mu0').value);
            
            let n1 = parseFloat(document.getElementById('n1').value);
            let x1 = parseFloat(document.getElementById('x1').value);
            let v1 = parseFloat(document.getElementById('v1').value);
            let n2 = parseFloat(document.getElementById('n2').value);
            let x2 = parseFloat(document.getElementById('x2').value);
            let v2 = parseFloat(document.getElementById('v2').value);

            let pasos = "";
            let estadistico = 0, valCritico = 0, pValue = 0, rechaza = false;
            let chartData = { type: type, stat: 0, crit: 0, df1: 0, df2: 0, alpha: alpha, tail: tail };

            if (type === 'z' || type === 't') {
                let diff = x1 - x2;
                let se = Math.sqrt((v1/n1) + (v2/n2));
                estadistico = (diff - valH0) / se;
                let gl = (type === 't') ? (n1 + n2 - 2) : 1000;
                chartData.df1 = gl;

                if (tail === 'right') {
                    valCritico = (type === 't') ? jStat.studentt.inv(1-alpha, gl) : jStat.normal.inv(1-alpha, 0, 1);
                    rechaza = estadistico > valCritico;
                    pValue = (type === 't') ? (1 - jStat.studentt.cdf(estadistico, gl)) : (1 - jStat.normal.cdf(estadistico, 0, 1));
                } else if (tail === 'left') {
                    valCritico = (type === 't') ? jStat.studentt.inv(alpha, gl) : jStat.normal.inv(alpha, 0, 1);
                    rechaza = estadistico < valCritico;
                } else {
                    valCritico = (type === 't') ? jStat.studentt.inv(1-alpha/2, gl) : jStat.normal.inv(1-alpha/2, 0, 1);
                    rechaza = Math.abs(estadistico) > valCritico;
                }

                pasos = `
                    <li><b>1) Parámetro:</b> Diferencia de medias (μ1 - μ2)</li>
                    <li><b>2) H0:</b> μ1 - μ2 = ${valH0}</li>
                    <li><b>3) H1:</b> μ1 - μ2 ${tail==='right'?'>':tail==='left'?'<':'≠'} ${valH0}</li>
                    <li><b>4) Alpha (α):</b> ${alpha}</li>
                    <li><b>5) Estadístico:</b> ${type==='z'?'Z':'t'}0 = ((x̄1 - x̄2) - H0) / SE</li>
                    <li><b>6) Región Rechazo:</b> Si ${type==='z'?'Z':'t'}0 ${tail==='right'?'>':tail==='left'?'<':'|>|'} ${valCritico.toFixed(3)}</li>
                    <li><b>7) Cálculo:</b> ${type==='z'?'Z':'t'}0 = <b>${estadistico.toFixed(4)}</b> (Valor p: ${pValue.toFixed(4)})</li>
                `;
            } 
            else if (type === 'chi') {
                let gl = n1 - 1;
                estadistico = (gl * v1) / valH0;
                chartData.df1 = gl;

                if (tail === 'right') {
                    valCritico = jStat.chisquare.inv(1-alpha, gl);
                    rechaza = estadistico > valCritico;
                } else if (tail === 'left') {
                    valCritico = jStat.chisquare.inv(alpha, gl);
                    rechaza = estadistico < valCritico;
                }

                pasos = `
                    <li><b>1) Parámetro:</b> Varianza poblacional (σ²)</li>
                    <li><b>2) H0:</b> σ² = ${valH0}</li>
                    <li><b>3) H1:</b> σ² ${tail==='right'?'>':'<'} ${valH0}</li>
                    <li><b>4) Alpha (α):</b> ${alpha}</li>
                    <li><b>5) Estadístico:</b> χ² = (n - 1)S² / σ²_0</li>
                    <li><b>6) Región Rechazo:</b> Si χ² ${tail==='right'?'>':'<'} ${valCritico.toFixed(3)} (gl=${gl})</li>
                    <li><b>7) Cálculo:</b> χ² = <b>${estadistico.toFixed(4)}</b></li>
                `;
            }
            else if (type === 'f') {
                let gl1 = n1 - 1;
                let gl2 = n2 - 1;
                chartData.df1 = gl1; chartData.df2 = gl2;
                
                estadistico = v1 / (valH0 * v2); 

                if (tail === 'right') {
                    valCritico = jStat.centralF.inv(1-alpha, gl1, gl2);
                    rechaza = estadistico > valCritico;
                } else if (tail === 'left') {
                    valCritico = jStat.centralF.inv(alpha, gl1, gl2);
                    rechaza = estadistico < valCritico;
                }

                pasos = `
                    <li><b>1) Parámetro:</b> Razón de Varianzas (σ²1 / σ²2)</li>
                    <li><b>2) H0:</b> σ²1 = ${valH0} * σ²2</li>
                    <li><b>3) H1:</b> σ²1 ${tail==='right'?'>':'<'} ${valH0} * σ²2</li>
                    <li><b>4) Alpha (α):</b> ${alpha}</li>
                    <li><b>5) Estadístico:</b> F0 = S²1 / (c * S²2)</li>
                    <li><b>6) Región Rechazo:</b> Si F0 ${tail==='right'?'>':'<'} ${valCritico.toFixed(3)} (gl1=${gl1}, gl2=${gl2})</li>
                    <li><b>7) Cálculo:</b> F0 = <b>${estadistico.toFixed(4)}</b></li>
                `;
            }

            let strDecision = rechaza ? 
                `<div class="bg-red-100 border-l-4 border-red-500 text-red-700 p-3 mt-2 rounded"><b>8) Conclusión: SE RECHAZA H0.</b> El estadístico cae en la región crítica.</div>` : 
                `<div class="bg-green-100 border-l-4 border-green-500 text-green-700 p-3 mt-2 rounded"><b>8) Conclusión: NO SE RECHAZA H0.</b> No hay evidencia estadística suficiente.</div>`;

            document.getElementById('resultados').classList.remove('hidden');
            document.getElementById('pasosList').innerHTML = pasos + strDecision;

            chartData.stat = estadistico;
            chartData.crit = valCritico;
            dibujarGrafica(chartData);
        }

        function dibujarGrafica(d) {
            const ctx = document.getElementById('miGrafica').getContext('2d');
            if(myChart) myChart.destroy();

            let labels = [], data = [];
            let minX = 0, maxX = 0;

            if(d.type === 'z' || d.type === 't') {
                minX = -4; maxX = 4;
                for(let x = minX; x <= maxX; x += 0.1) {
                    labels.push(x.toFixed(1));
                    data.push((d.type === 'z') ? jStat.normal.pdf(x, 0, 1) : jStat.studentt.pdf(x, d.df1));
                }
            } else if (d.type === 'chi') {
                minX = 0; maxX = Math.max(d.crit * 1.5, d.stat * 1.5, d.df1 * 2);
                for(let x = minX; x <= maxX; x += maxX/50) {
                    labels.push(x.toFixed(1));
                    data.push(jStat.chisquare.pdf(x, d.df1));
                }
            } else if (d.type === 'f') {
                minX = 0; maxX = Math.max(d.crit * 1.5, d.stat * 1.5, 5);
                for(let x = minX; x <= maxX; x += maxX/50) {
                    labels.push(x.toFixed(2));
                    data.push(jStat.centralF.pdf(x, d.df1, d.df2));
                }
            }

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Distribución',
                        data: data,
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37, 99, 235, 0.1)',
                        fill: true,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        annotation: {
                            annotations: {
                                lineCrit: {
                                    type: 'line',
                                    xMin: d.crit.toFixed(d.type==='f'?2:1),
                                    xMax: d.crit.toFixed(d.type==='f'?2:1),
                                    borderColor: 'red',
                                    borderWidth: 2,
                                    borderDash: [5, 5],
                                    label: {
                                        display: true,
                                        content: 'V. Crítico: ' + d.crit.toFixed(2),
                                        position: 'start',
                                        backgroundColor: 'rgba(255,0,0,0.8)'
                                    }
                                },
                                lineStat: {
                                    type: 'line',
                                    xMin: d.stat.toFixed(d.type==='f'?2:1),
                                    xMax: d.stat.toFixed(d.type==='f'?2:1),
                                    borderColor: 'green',
                                    borderWidth: 3,
                                    label: {
                                        display: true,
                                        content: 'Calculado: ' + d.stat.toFixed(2),
                                        position: 'end',
                                        backgroundColor: 'rgba(0,128,0,0.8)'
                                    }
                                }
                            }
                        }
                    },
                    scales: {
                        x: { display: true, title: {display: true, text: 'Valor del Estadístico'} },
                        y: { display: false }
                    }
                }
            });
        }
        
        actualizarUI();
    </script>
</body>
</html>
